<!DOCTYPE html>
<html>
<head>
    <title>Product Manager</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .product-card { border: 1px solid #ccc; padding: 10px; margin: 10px 0; border-radius: 8px; }
        button { cursor: pointer; margin-right: 5px; }
        .delete-btn { color: white; background: red; border: none; padding: 5px; }
    </style>
</head>
<body>
    <h2>Add New Product</h2>
    <input id="name" placeholder="Name">
    <input id="price" type="number" placeholder="Price">
    <input id="stock" type="number" placeholder="Stock">
    <button onclick="addProduct()">Add Product</button>

    <hr>
    <h2>Product List</h2>
    <div id="product-list">Loading...</div>

    <script>
        const API_URL = 'http://127.0.0.1:8000/products/';

        // 1. Fetch and Display
        async function loadProducts() {
            const res = await fetch(API_URL);
            const data = await res.json();
            const container = document.getElementById('product-list');
            container.innerHTML = data.map(p => `
                <div class="product-card">
                    <strong>${p.name}</strong> - $${p.price} (Stock: ${p.stock})
                    <br><br>
                    <button onclick="deleteProduct(${p.id})" class="delete-btn">Delete</button>
                </div>
            `).join('');
        }

        // 2. Add (POST)
        async function addProduct() {
            const body = {
                name: document.getElementById('name').value,
                price: document.getElementById('price').value,
                stock: document.getElementById('stock').value
            };
            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            loadProducts();
        }

        // 3. Delete (DELETE)
        async function deleteProduct(id) {
            if(confirm("Delete this item?")) {
                await fetch(`${API_URL}${id}/`, { method: 'DELETE' });
                loadProducts();
            }
        }

        loadProducts();
    </script>
</body>
</html>
